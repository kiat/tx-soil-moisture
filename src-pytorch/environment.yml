name: tx-soil-pytorch
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.9
  
  # PyTorch and related
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - tensorboard>=2.11.0
  - cpuonly  # Remove this line if you need GPU support, replace with cudatoolkit
  
  # Data processing
  - pandas>=1.5.0
  - numpy>=1.23.0
  
  # Machine learning
  - scikit-learn>=1.2.0
  - scipy>=1.10.0
  
  # Visualization
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  
  # File I/O
  - fastparquet>=2023.1.0
  
  # Jupyter support
  - jupyter
  - notebook
  - ipykernel
  - tqdm
  
  # Pip packages (packages not available via conda)
  - pip
  - pip:
    - torch  # Ensure latest PyTorch via pip if needed
